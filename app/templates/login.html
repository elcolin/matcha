<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matcha — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<!-- <body> -->
<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="/">❤️ Matcha</a>
      <div class="ms-auto">
        <a href="/login"    class="btn btn-outline-danger me-2">Login</a>
        <a href="/register" class="btn btn-danger">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- <div class="d-flex justify-content-center pt-5 flex-grow-1"> -->
  <div class="d-flex justify-content-center pt-5">
    <div class="card shadow-sm" style="width:360px">
      <div class="card-body p-4">

        <h5 class="card-title mb-4">Login</h5>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" type="text" required />
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input name="password" class="form-control" type="password" required />
          </div>
          <button type="submit" class="btn btn-danger w-100 mb-3">Login</button>
        </form>

        <div class="d-flex justify-content-between">
          <a href="/password-reset/request" class="btn btn-link btn-sm p-0 text-muted">Forgot password?</a>
          <a href="/register"       class="btn btn-link btn-sm p-0 text-muted">Create account</a>
        </div>

      </div>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <small>© 2026 Matcha</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
