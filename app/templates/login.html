<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matcha — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar bg-white border-bottom px-4">
    <a class="navbar-brand fw-bold" href="/">MATCHA</a>
    <div class="d-flex gap-2">
      <a href="/login"    class="btn btn-outline-secondary btn-sm">Login</a>
      <a href="/register" class="btn btn-dark btn-sm">Register</a>
    </div>
  </nav>

  <div class="d-flex justify-content-center pt-5">
    <div class="card shadow-sm" style="width:360px">
      <div class="card-body p-4">

        <h5 class="card-title mb-4">Login</h5>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" type="text" required />
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input name="password" class="form-control" type="password" required />
          </div>
          <button type="submit" class="btn btn-dark w-100 mb-3">Login</button>
        </form>

        <div class="d-flex justify-content-between">
          <a href="/password-reset" class="btn btn-link btn-sm p-0 text-muted">Forgot password?</a>
          <a href="/register"       class="btn btn-link btn-sm p-0 text-muted">Create account</a>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
