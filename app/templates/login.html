{% extends "components/base.html" %}
{% block title %}Matcha — Login{% endblock %}
{% block content %}

{% if request.args.get('verified') %}
  <div class="alert alert-success">Email verified! You can now log in.</div>
{% endif %}

  <div class="d-flex justify-content-center pt-5">
    <div class="card shadow-sm" style="width:360px">
      <div class="card-body p-4">

        <h5 class="card-title mb-4">Login</h5>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" type="text" required />
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input name="password" class="form-control" type="password" required />
          </div>
          <button type="submit" class="btn btn-danger w-100 mb-3">Login</button>
        </form>

        <div class="d-flex justify-content-between">
          <a href="/password-reset/request" class="btn btn-link btn-sm p-0 text-muted">Forgot password?</a>
          <a href="/register"       class="btn btn-link btn-sm p-0 text-muted">Create account</a>
        </div>

      </div>
    </div>
  </div>

{% endblock %}
