{% extends "components/base.html" %}
{% block title %}Matcha — Forgot Password{% endblock %}
{% block content %}

  <div class="d-flex justify-content-center pt-5">
    <div class="card shadow-sm" style="width:360px">
      <div class="card-body p-4">

        <h5 class="card-title mb-1">Reset Password</h5>
        <p class="text-muted mb-3" style="font-size:0.85rem">Enter your email — we will send a reset link.</p>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        {% if success %}
          <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/password-reset/request">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input name="email" class="form-control" type="email" required />
          </div>
          <button type="submit" class="btn btn-danger w-100 mb-3">Send Reset Link</button>
        </form>

        <div class="text-center">
          <a href="/login" class="btn btn-link btn-sm text-muted">Back to Login</a>
        </div>

      </div>
    </div>
  </div>

{% endblock %}
