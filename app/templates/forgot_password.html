<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matcha — Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="/">❤️ Matcha</a>
      <div class="ms-auto">
        <a href="/login"    class="btn btn-outline-danger me-2">Login</a>
        <a href="/register" class="btn btn-danger">Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="d-flex justify-content-center pt-5">
    <div class="card shadow-sm" style="width:360px">
      <div class="card-body p-4">

        <h5 class="card-title mb-1">Reset Password</h5>
        <p class="text-muted mb-3" style="font-size:0.85rem">Enter your email — we will send a reset link.</p>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        {% if success %}
          <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/password-reset/request">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input name="email" class="form-control" type="email" required />
          </div>
          <button type="submit" class="btn btn-danger w-100 mb-3">Send Reset Link</button>
        </form>

        <div class="text-center">
          <a href="/login" class="btn btn-link btn-sm text-muted">Back to Login</a>
        </div>

      </div>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <small>© 2026 Matcha</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
