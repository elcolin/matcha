{% extends "base.html" %}
{% block title %}Register - Matcha{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4 text-center">Create your account</h1>
                    <form method="post" action="{{ url_for('auth.register') }}">
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" type="email" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="username">Username</label>
                            <input class="form-control" type="text" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="first_name">First name</label>
                            <input class="form-control" type="text" id="first_name" name="first_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="last_name">Last name</label>
                            <input class="form-control" type="text" id="last_name" name="last_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" type="password" id="password" name="password" minlength="10" required>
                            <div class="form-text">At least 10 characters, with uppercase, lowercase, digit and special character.</div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Register</button>
                    </form>
                    <p class="text-center mt-3 mb-0">
                        Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
