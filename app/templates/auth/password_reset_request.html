{% extends "base.html" %}
{% block title %}Forgot password - Matcha{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4 text-center">Reset your password</h1>
                    <form method="post" action="{{ url_for('auth.request_password_reset') }}">
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" type="email" id="email" name="email" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Send reset link</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
