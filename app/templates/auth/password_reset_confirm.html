{% extends "base.html" %}
{% block title %}Choose a new password - Matcha{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4 text-center">Choose a new password</h1>
                    <form method="post" action="{{ url_for('auth.confirm_password_reset', token=token) }}">
                        <div class="mb-3">
                            <label class="form-label" for="password">New password</label>
                            <input class="form-control" type="password" id="password" name="password" minlength="10" required>
                            <div class="form-text">At least 10 characters, with uppercase, lowercase, digit and special character.</div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Update password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
