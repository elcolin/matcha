<div class="col-md-4">
    <div class="card profile-card shadow-sm">
        <img src="{{ profile.image }}" class="card-img-top">

        <div class="card-body text-center">
            <h5>{{ profile.name }}, {{ profile.age }}</h5>

            <p class="text-muted">
                {{ profile.city }} • {{ profile.interests }}
            </p>

            <a href="{{ url_for('profile.detail', id=profile.id) }}"
               class="btn btn-outline-danger btn-sm">
                View
            </a>
        </div>
    </div>
</div>
