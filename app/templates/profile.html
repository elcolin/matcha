<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .profile-card {
            border-radius: 20px;
            overflow: hidden;
        }

        .profile-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .tag {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            background: #ffe3e3;
            margin: 3px;
            font-size: 0.85rem;
        }

        .action-btn {
            border-radius: 30px;
            padding: 10px 20px;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAV -->
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('main.home') }}">❤️ Matcha Flock</a>
        <a href="{{ url_for('main.home') }}" class="btn btn-outline-danger btn-sm">Back to Explore</a>
    </div>
</nav>

<!-- PROFILE SECTION -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card profile-card shadow">

                <!-- IMAGE -->
                <img src="{{ profile.image }}"
                     class="profile-img"
                     alt="{{ profile.name }} profile picture">

                <!-- BODY -->
                <div class="card-body p-4">

                    <!-- NAME + AGE -->
                    <h2 class="fw-bold mb-0">{{ profile.name }}, {{ profile.age }} 🐦</h2>
                    <p class="text-muted">{{ profile.city }}</p>

                    <!-- BIO -->
                    <p>{{ profile.bio }}</p>

                    <!-- TAGS -->
                    <div class="mb-3">
                        {% for interest in profile.interests.split(' • ') %}
                            <span class="tag">{{ interest }}</span>
                        {% endfor %}
                    </div>

                    <!-- ACTION BUTTONS -->
                    <div class="d-flex gap-2">
                        <a href="#" class="btn btn-danger action-btn">💖 Match</a>
                        <a href="#" class="btn btn-outline-dark action-btn">💬 Message</a>
                        <a href="#" class="btn btn-outline-secondary action-btn">🚩 Report</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="text-center py-4 text-muted">
    <small>© 2026 Matcha Flock</small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
