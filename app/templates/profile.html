<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .profile-card {
            border-radius: 20px;
            overflow: hidden;
        }

        .profile-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .tag {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            background: #ffe3e3;
            margin: 3px;
            font-size: 0.85rem;
        }

        .action-btn {
            border-radius: 30px;
            padding: 10px 20px;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAV -->
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">❤️ Matcha Flock</a>
        <a href="/explore" class="btn btn-outline-danger btn-sm">Back to Explore</a>
    </div>
</nav>

<!-- PROFILE SECTION -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card profile-card shadow">

                <!-- IMAGE -->
                <img src="{{ url_for('static', filename='img/profile1.jpg') }}"
                     class="profile-img"
                     alt="Profile picture">

                <!-- BODY -->
                <div class="card-body p-4">

                    <!-- NAME + AGE -->
                    <h2 class="fw-bold mb-0">Satin BowerBird, 7 🐦</h2>
                    <p class="text-muted">Paris • Night owl • Coffee addict</p>

                    <!-- BIO -->
                    <p>
                        I believe in love at first chirp.
                        Collecting shiny objects (blue), and long nest-building sessions on Sundays.
                    </p>

                    <!-- TAGS -->
                    <div class="mb-3">
                        <span class="tag">Coffee</span>
                        <span class="tag">Travel</span>
                        <span class="tag">Photography</span>
                        <span class="tag">Sunsets</span>
                    </div>

                    <!-- ACTION BUTTONS -->
                    <div class="d-flex gap-2">
                        <a href="#" class="btn btn-danger action-btn">💖 Match</a>
                        <a href="#" class="btn btn-outline-dark action-btn">💬 Message</a>
                        <a href="#" class="btn btn-outline-secondary action-btn">🚩 Report</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="text-center py-4 text-muted">
    <small>© 2026 Matcha Flock</small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
